<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Globe Grid (Simplified) -->
    <circle cx="50" cy="65" r="25" stroke="#dc143c" stroke-width="1" opacity="0.3"/>
    <path d="M25 65 Q50 40 75 65" stroke="#dc143c" stroke-width="0.5" opacity="0.2"/>
    <path d="M25 65 Q50 90 75 65" stroke="#dc143c" stroke-width="0.5" opacity="0.2"/>
    <path d="M50 40 L50 90" stroke="#dc143c" stroke-width="0.5" opacity="0.2"/>
    
    <!-- Connection Nodes -->
    <circle cx="50" cy="40" r="1.5" fill="#dc143c"/>
    <circle cx="75" cy="65" r="1.5" fill="#dc143c"/>
    <circle cx="50" cy="90" r="1.5" fill="#dc143c"/>
    <circle cx="25" cy="65" r="1.5" fill="#dc143c"/>
    <circle cx="32" cy="48" r="1" fill="#dc143c"/>
    <circle cx="68" cy="48" r="1" fill="#dc143c"/>

    <!-- Drone Silhouette (Sleek Modern Version) -->
    <g filter="url(#glow)">
        <!-- Body -->
        <rect x="42" y="25" width="16" height="6" rx="2" fill="white"/>
        <!-- Arms -->
        <path d="M42 28 L25 20 M58 28 L75 20 M42 28 L25 36 M58 28 L75 36" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <!-- Rotors -->
        <circle cx="25" cy="20" r="4" stroke="white" stroke-width="1" stroke-dasharray="2 1"/>
        <circle cx="75" cy="20" r="4" stroke="white" stroke-width="1" stroke-dasharray="2 1"/>
        <circle cx="25" cy="36" r="4" stroke="white" stroke-width="1" stroke-dasharray="2 1"/>
        <circle cx="75" cy="36" r="4" stroke="white" stroke-width="1" stroke-dasharray="2 1"/>
        <!-- Landing Gear (connecting to globe) -->
        <path d="M45 31 Q45 45 40 50 M55 31 Q55 45 60 50" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    </g>
</svg>
